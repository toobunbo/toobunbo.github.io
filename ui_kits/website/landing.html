<!-- @startingPoint section="Website" subtitle="CYBERKNIGHT mascot cover landing" viewport="1280x820" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBERKNIGHT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Serif:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../styles.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--paper);
    background-image:var(--paper-grain);
    background-size:4px 4px;
    color:var(--ink);
    height:100vh;
    overflow:hidden;
    position:relative;
    font-family:var(--font-body);
  }

  /* faint storyboard marks */
  .storyboard{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .sb-mark{position:absolute;font-family:var(--font-jp);font-weight:800;color:var(--ink);opacity:.04;writing-mode:vertical-rl;letter-spacing:8px;line-height:1}
  .sb-slogan{
    position:absolute;
    font-family:var(--font-display);
    font-size:clamp(30px,3.6vw,52px);line-height:.98;letter-spacing:1px;
    color:var(--ink);opacity:.05;
  }
  .sb-panel{position:absolute;border:1px solid var(--ink);opacity:.05;background:repeating-linear-gradient(-45deg,transparent 0 13px,var(--ink) 13px 13.6px)}

  /* big mascot bleeding off the right edge */
  .mascot{
    position:absolute;right:-16px;bottom:0;
    height:106%;z-index:1;
    mix-blend-mode:multiply;
    pointer-events:none;
    filter:drop-shadow(8px 8px 0 rgba(30,27,22,.08));
  }

  .shell{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;padding:26px var(--gutter)}

  /* top nav */
  .nav{display:flex;align-items:center;gap:22px}
  .nav .corner{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;color:var(--ink-3);text-transform:uppercase}
  .nav .links{margin-left:auto;display:flex;gap:22px}
  .nav a{font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:1.5px;color:var(--ink-2);text-decoration:none;position:relative;padding-bottom:3px;transition:color .12s ease}
  .nav a::after{content:"";position:absolute;left:0;right:100%;bottom:0;height:2px;background:var(--accent);transition:right .16s ease}
  .nav a:hover{color:var(--ink)}
  .nav a:hover::after{right:0}

  /* hero */
  .hero{flex:1;display:flex;flex-direction:column;justify-content:center;gap:clamp(30px,5vh,48px);max-width:640px}
  .kanji-sub{font-family:var(--font-jp);font-weight:700;font-size:14px;letter-spacing:12px;color:var(--ink-3);margin-bottom:8px;padding-left:10px}
  .wordmark{font-family:var(--font-display);font-size:clamp(56px,9vw,108px);line-height:.88;letter-spacing:2px}
  .wordmark .k{color:var(--accent)}

  /* index (目次) — a manga table-of-contents block */
  .index{max-width:430px}
  .index-head{display:flex;align-items:center;gap:10px;border-bottom:var(--bw-heavy) solid var(--ink);padding-bottom:8px;margin-bottom:2px}
  .index-head .en{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:3px;color:var(--ink-2)}
  .index-head .jp{font-family:var(--font-jp);font-weight:700;font-size:12px;letter-spacing:4px;color:var(--ink-3)}
  .index-head .n{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--ink-3)}

  .entry{
    display:flex;align-items:center;gap:18px;
    padding:16px 6px 16px 4px;
    border-bottom:var(--bw-rule) solid var(--ink);
    text-decoration:none;color:var(--ink);
    position:relative;
    transition:padding-left .16s ease,background .12s ease;
  }
  .entry:hover{padding-left:16px;background:var(--accent-soft)}
  .entry .no{
    font-family:var(--font-display);font-size:26px;color:var(--accent);
    line-height:1;letter-spacing:1px;flex:none;width:64px;
  }
  .entry .no small{font-family:var(--font-jp);font-weight:700;font-size:12px;color:var(--ink-3);display:block;letter-spacing:2px;margin-top:3px}
  .entry h2{font-family:var(--font-body);font-weight:700;font-size:23px;margin:0;letter-spacing:-.2px}
  .entry .jp{font-family:var(--font-jp);font-weight:700;font-size:12px;letter-spacing:4px;color:var(--ink-3);margin-top:3px}
  .entry .arw{margin-left:auto;font-family:var(--font-mono);font-size:20px;color:var(--accent);transition:transform .16s ease}
  .entry:hover .arw{transform:translateX(6px)}

  .foot-jp{position:absolute;left:var(--gutter);bottom:22px;z-index:3;font-family:var(--font-mono);font-size:11px;letter-spacing:1px;color:var(--ink-3)}
  .theme-tog{position:absolute;right:var(--gutter);bottom:20px;z-index:4;font-family:var(--font-mono);font-size:11px;letter-spacing:.5px;padding:6px 11px;cursor:pointer;border:var(--bw-rule) solid var(--ink);border-radius:var(--r-2);background:transparent;color:var(--ink)}

  /* the mascot's light shadows read a bit heavy on the dark negative — soften */
  html[data-theme="dark"] .mascot{mix-blend-mode:screen;filter:drop-shadow(8px 8px 0 rgba(0,0,0,.3))}
</style>
</head>
<body>
  <div class="storyboard">
    <div class="sb-panel" style="top:9%;left:3%;width:180px;height:135px;transform:rotate(-2deg)"></div>
    <div class="sb-panel" style="bottom:9%;left:6%;width:150px;height:120px;transform:rotate(1.5deg)"></div>
    <div class="sb-mark" style="top:12%;left:34%;font-size:88px">攻性思考</div>
    <div class="sb-mark" style="bottom:8%;left:8%;font-size:88px">騎士道</div>
  </div>

  <img class="mascot" src="../../assets/knight-mascot.png" alt="CYBERKNIGHT mascot">

  <div class="shell">
    <div class="nav">
      <span class="corner">規律の中の自由</span>
      <span class="links">
        <a href="landing.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="members.html">MEMBERS</a>
        <a href="index.html">ARCHIVE</a>
      </span>
    </div>

    <div class="hero">
      <div>
        <div class="kanji-sub">サイバーナイト</div>
        <div class="wordmark">CYBER<br><span class="k">KNIGHT</span></div>
      </div>
      <div class="index">
        <div class="index-head">
          <span class="en">INDEX</span>
          <span class="jp">目次</span>
          <span class="n">02</span>
        </div>
        <a class="entry" href="about.html">
          <span class="no">01<small>序章</small></span>
          <div><h2>About</h2><div class="jp">部について</div></div>
          <span class="arw">→</span>
        </a>
        <a class="entry" href="members.html">
          <span class="no">02<small>部員</small></span>
          <div><h2>Team Member</h2><div class="jp">部員紹介</div></div>
          <span class="arw">→</span>
        </a>
      </div>
    </div>
  </div>

  <span class="foot-jp">連載中 · ink on paper</span>
  <button class="theme-tog" id="tog">反転 OFF</button>

  <script>
    const tog = document.getElementById('tog');
    tog.addEventListener('click', () => {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
      tog.textContent = dark ? '反転 OFF' : '反転 ON';
    });
  </script>
</body>
</html>
