<!-- @dsCard group="Colors" viewport="700x150" name="Paper & Ink (light)" subtitle="Cream paper P2 + warm charcoal ink — the default ground" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Shippori+Mincho:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);background-image:var(--paper-grain);background-size:4px 4px;padding:16px;font-family:var(--font-mono);color:var(--ink)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .sw{border:1px solid rgba(0,0,0,.15)}
  .c{height:64px}
  .l{font-size:9.5px;line-height:1.35;padding:5px 6px;background:var(--card)}
  .l b{display:block;font-size:10px;color:var(--ink)}
  .l span{color:var(--ink-3)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="c" style="background:#F5EEDF"></div><div class="l"><b>Paper</b><span>#F5EEDF</span></div></div>
    <div class="sw"><div class="c" style="background:#EFE6D2"></div><div class="l"><b>Paper-2</b><span>#EFE6D2</span></div></div>
    <div class="sw"><div class="c" style="background:#FDF9F0"></div><div class="l"><b>Card</b><span>#FDF9F0</span></div></div>
    <div class="sw"><div class="c" style="background:#1E1B16"></div><div class="l"><b>Ink</b><span>#1E1B16</span></div></div>
    <div class="sw"><div class="c" style="background:#524B3E"></div><div class="l"><b>Ink-2</b><span>#524B3E</span></div></div>
    <div class="sw"><div class="c" style="background:#8A8069"></div><div class="l"><b>Ink-3</b><span>#8A8069</span></div></div>
  </div>
</body></html>
