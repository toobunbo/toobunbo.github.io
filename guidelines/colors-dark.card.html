<!-- @dsCard group="Colors" viewport="700x160" name="Dark mode — negative print" subtitle="paper⇄ink swap; vermilion lifts one step" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark"><head><meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Shippori+Mincho:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);background-image:var(--paper-grain);background-size:4px 4px;padding:16px;font-family:var(--font-mono);color:var(--ink)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .sw{border:1px solid rgba(255,255,255,.12)}
  .c{height:56px}
  .l{font-size:9.5px;line-height:1.35;padding:5px 6px;background:var(--card)}
  .l b{display:block;font-size:10px;color:var(--ink)}
  .l span{color:var(--ink-3)}
  .note{font-size:9.5px;color:var(--ink-3);margin-top:8px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="c" style="background:#16130D"></div><div class="l"><b>BG</b><span>#16130D</span></div></div>
    <div class="sw"><div class="c" style="background:#201C14"></div><div class="l"><b>Surface</b><span>#201C14</span></div></div>
    <div class="sw"><div class="c" style="background:#ECE2CF"></div><div class="l"><b>Ink</b><span>#ECE2CF</span></div></div>
    <div class="sw"><div class="c" style="background:#9C927C"></div><div class="l"><b>Ink-2</b><span>#9C927C</span></div></div>
    <div class="sw"><div class="c" style="background:#E85E44"></div><div class="l"><b>Accent 朱</b><span>#E85E44</span></div></div>
    <div class="sw"><div class="c" style="background:#5FD08A"></div><div class="l"><b>Term 緑</b><span>#5FD08A</span></div></div>
  </div>
  <div class="note">// toggle: html[data-theme="dark"] — a calculated negative of the light palette, not a separate theme</div>
</body></html>
