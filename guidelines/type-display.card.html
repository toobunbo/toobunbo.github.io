<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Shippori+Mincho:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);background-image:var(--paper-grain);background-size:4px 4px;padding:22px;color:var(--ink)}
  .wm{font-family:var(--font-display);font-size:56px;line-height:.95;letter-spacing:1px}
  .wm span{color:var(--accent)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);letter-spacing:1px;margin-top:12px}
  .glyphs{font-family:var(--font-display);font-size:26px;color:var(--ink-2);margin-top:6px;letter-spacing:2px}
</style></head>
<body>
  <div class="wm">CYBER<span>KNIGHT</span></div>
  <div class="glyphs">CH.01 · #42 · ABCDEFG 0123456789</div>
  <div class="meta">Reggae One · 400 · Google Fonts · Latin only (JP labels use body face)</div>
</body></html>
