<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale — 4px base" subtitle="sp-1 → sp-20" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Shippori+Mincho:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);background-image:var(--paper-grain);background-size:4px 4px;padding:22px;color:var(--ink);font-family:var(--font-mono)}
  .rows{display:flex;flex-direction:column;gap:7px}
  .r{display:flex;align-items:center;gap:12px;font-size:11px}
  .r .n{width:70px;color:var(--ink-2)}
  .r .bar{height:14px;background:var(--accent);border:1px solid var(--ink)}
  .r .px{color:var(--ink-3)}
</style></head>
<body>
  <div class="rows">
    <div class="r"><span class="n">--sp-1</span><span class="bar" style="width:4px"></span><span class="px">4</span></div>
    <div class="r"><span class="n">--sp-2</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
    <div class="r"><span class="n">--sp-4</span><span class="bar" style="width:16px"></span><span class="px">16</span></div>
    <div class="r"><span class="n">--sp-6</span><span class="bar" style="width:24px"></span><span class="px">24</span></div>
    <div class="r"><span class="n">--sp-8</span><span class="bar" style="width:32px"></span><span class="px">32</span></div>
    <div class="r"><span class="n">--sp-12</span><span class="bar" style="width:48px"></span><span class="px">48</span></div>
    <div class="r"><span class="n">--sp-20</span><span class="bar" style="width:80px"></span><span class="px">80</span></div>
  </div>
</body></html>
