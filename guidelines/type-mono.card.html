<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Shippori+Mincho:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);background-image:var(--paper-grain);background-size:4px 4px;padding:22px;color:var(--ink);font-family:var(--font-mono)}
  .k{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-3)}
  .code{background:var(--code-bg);color:var(--code-fg);border:2px solid var(--ink);padding:12px 14px;margin-top:10px;font-size:13px;line-height:1.7}
  .code .p{color:var(--code-green)}
  .code .c{color:var(--code-com)}
  .code .g{color:var(--code-green)}
  .meta{font-size:11px;color:var(--ink-3);letter-spacing:1px;margin-top:10px}
</style></head>
<body>
  <div class="k">CH.01 · CTF WRITEUP · #pwn #web</div>
  <div class="code">
    <div class="c"># reproduce</div>
    <div><span class="p">nyx@ckn:~$</span> ./solve.py --flag</div>
    <div class="g">[+] flag{ink_on_paper}</div>
  </div>
  <div class="meta">IBM Plex Mono · 400 / 500 / 600 / 700</div>
</body></html>
